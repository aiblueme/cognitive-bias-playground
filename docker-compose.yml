services:
  logic:
    build: .
    image: logic
    container_name: logic
    restart: unless-stopped
    networks:
      - swag-network
    labels:
      - "swag=enable"
      - "swag_address=logic"
      - "swag_port=3000"
      - "swag_url=logic.shellnode.lol"
      - "homepage.instance=my-vps"
      - "homepage.name=Logic"
      - "homepage.group=Tools"
      - "homepage.href=https://logic.shellnode.lol"
      - "homepage.icon=mdi-brain"
      - "homepage.description=Cognitive Bias Playground"

networks:
  swag-network:
    external: true
